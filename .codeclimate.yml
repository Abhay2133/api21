version: "2"
checks:
  method-lines:
    config:
      threshold: 100
plugins:
  fixme:
    enabled: true
  eslint:
    enabled: true
    channel: "stable"
exclude_patterns:
  - "dist/**/*"
  - "frontend/dist/**/*"
  - "**/node_modules/"
  - "server/db/**/*.sqlite3"
  - "drizzle/**/*"
  - "nuxt_backup/**/*"
  - ".agents/**/*"
