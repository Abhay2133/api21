name: CI/CD Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GO_ENV: test
      REDIS_URL: redis://localhost:6379
      DATABASE_URL: postgres://postgres:password@localhost:5432/api21_test?sslmode=disable

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: api21_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Run Go Tests
        run: |
          CGO_ENABLED=0 go test -p 1 -v ./...

      - name: Build ARM64 Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o bin/api21_server cmd/app/main.go

      - name: Prepare Deployment Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p ~/api21/bin ~/api21/static

      - name: Copy Binary and Assets to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "bin/api21_server,static/index.html"
          target: "~/api21"

      - name: Restart Systemd Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Make the binary executable
            chmod +x ~/api21/bin/api21_server
            
            # Restart the service (assumes systemd service is configured as described in README.md)
            sudo systemctl restart api21.service

      - name: Verify Service Status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=== SYSTEMD STATUS ==="
            sudo systemctl status api21.service --no-pager || true
            
            echo "=== SYSTEMD RECENT LOGS ==="
            sudo journalctl -u api21.service -n 50 --no-pager || true
            
            echo "=== NGINX CONFIG ==="
            sudo cat /etc/nginx/sites-enabled/* || cat /etc/nginx/nginx.conf || true
            
            echo "=== LISTENING PORTS ==="
            netstat -an | grep LISTEN || true
