name: CI/CD Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: ./server/db/test.sqlite3
      REDIS_URL: redis://localhost:6379

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Migrations
        run: bun db:migrate

      - name: Run Unit Tests
        run: bun run test:unit

      - name: Build Nuxt App
        run: bun run build


      - name: Prepare VM for Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/api21
            git reset --hard origin/main
            git pull origin main
            rm -rf .output

      - name: Copy .output to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: ".output"
          target: "~/api21"

      - name: Install Dependencies & Restart on GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Load system binaries and shell profiles (so bun/pm2 are in scope)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            # 2. Navigate to project repository
            cd ~/api21

            # 3. Install dependencies (fast because node_modules is cached)
            bun install --frozen-lockfile

            # 4. Migrate and restart via PM2 (prestart will run bun db:migrate)
            bun run start
