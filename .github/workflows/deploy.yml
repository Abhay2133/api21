name: CI/CD Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/api21
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: api21
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Migrations
        run: bun db:migrate

      - name: Run Unit Tests
        run: bun run test:unit

      - name: Build Nuxt App
        run: bun run build

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers & Deps
        run: bunx playwright install chromium --with-deps

      - name: Start Server for E2E Tests
        run: bun .output/server/index.mjs &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for Server to be Ready
        run: bunx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E Tests
        run: bun run test:e2e

      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Load system binaries and shell profiles (so bun/pm2 are in scope)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            # 2. Navigate to project repository
            cd ~/api21

            # 3. Pull latest changes
            git reset --hard origin/main
            git pull origin main

            # 4. Install deps, migrate, build, and restart via PM2
            bun install --frozen-lockfile
            bun run start
