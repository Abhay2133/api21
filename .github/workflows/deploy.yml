name: CI/CD Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GO_ENV: test
      REDIS_URL: redis://localhost:6379

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build Frontend
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run build

      - name: Run Go Tests
        run: |
          CGO_ENABLED=1 go test -p 1 -v ./...

      - name: Build Backend
        run: |
          CGO_ENABLED=1 go build -o bin/api21_server cmd/app/main.go

      - name: Prepare VM for Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/api21
            git reset --hard origin/main
            git pull origin main
            mkdir -p bin server/db frontend

      - name: Copy Binary and Configs to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "bin/api21_server,ecosystem.config.js,frontend/dist/**"
          target: "~/api21"

      - name: Run Migrations & Restart on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Load system profiles (for pm2)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Make sure bun path is loaded (PM2 will need bun)
            export PATH=$PATH:$HOME/.bun/bin

            cd ~/api21
            # Make the binary executable
            chmod +x bin/api21_server
            
            # Run migrations
            GO_ENV=production ./bin/api21_server migrate

            # Restart app via PM2
            pm2 delete api21-backend api21-ssr || true
            pm2 start ecosystem.config.js
