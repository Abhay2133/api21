name: CI/CD Tests and Redeploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: api21
          POSTGRES_PASSWORD: api21_password
          POSTGRES_DB: api21_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.5'
        cache: true

    - name: Download dependencies
      run: |
        go mod download
        go mod tidy

    - name: Install Buffalo CLI
      run: go install github.com/gobuffalo/cli/cmd/buffalo@latest

    - name: Install PostgreSQL Client
      run: sudo apt-get update && sudo apt-get install -y postgresql-client

    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432 -U api21; do
          echo 'Waiting for PostgreSQL...'
          sleep 1
        done
      env:
        PGPASSWORD: api21_password

    - name: Create test database
      run: |
        psql -h localhost -U api21 -c "CREATE DATABASE api21_test;" || true
      env:
        PGPASSWORD: api21_password

    - name: Run migrations
      run: buffalo pop migrate up
      env:
        DATABASE_URL: postgres://api21:api21_password@localhost:5432/api21_test?sslmode=disable

    - name: Run tests
      run: buffalo test -v
      env:
        DATABASE_URL: postgres://api21:api21_password@localhost:5432/api21_test?sslmode=disable

    - name: Run tests with coverage
      run: buffalo test -cover
      env:
        DATABASE_URL: postgres://api21:api21_password@localhost:5432/api21_test?sslmode=disable

  redeploy:
    name: Trigger Redeploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Wait for deployment server to be ready
      run: |
        echo "Waiting for deployment server..."
        sleep 5

    - name: Trigger redeploy endpoint
      run: |
        # Poll the redeploy endpoint with retry logic
        MAX_RETRIES=3
        RETRY_COUNT=0
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
          
          # Trigger redeploy
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.REDEPLOY_URL }}/api/redeploy")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" = "202" ]; then
            echo "Redeploy initiated successfully!"
            echo "Response: $BODY"
            
            # Extract version from response
            VERSION=$(echo "$BODY" | grep -o '"version":[0-9]*' | cut -d':' -f2)
            echo "Deployment version: $VERSION"
            
            # Poll for deployment status
            MAX_POLLS=120
            POLL_COUNT=0
            
            while [ $POLL_COUNT -lt $MAX_POLLS ]; do
              echo "Polling deployment status (attempt $((POLL_COUNT + 1))/$MAX_POLLS)..."
              
              STATUS_RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
                -H "Content-Type: application/json" \
                "${{ secrets.REDEPLOY_URL }}/api/redeploy/$VERSION")
              
              STATUS_CODE=$(echo "$STATUS_RESPONSE" | tail -n1)
              STATUS_BODY=$(echo "$STATUS_RESPONSE" | head -n-1)
              
              if [ "$STATUS_CODE" = "200" ]; then
                STATUS=$(echo "$STATUS_BODY" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
                echo "Deployment status: $STATUS"
                
                if [ "$STATUS" = "completed" ]; then
                  echo "✓ Deployment completed successfully!"
                  exit 0
                elif [ "$STATUS" = "failed" ]; then
                  ERROR=$(echo "$STATUS_BODY" | grep -o '"error":"[^"]*"' | cut -d'"' -f4)
                  echo "✗ Deployment failed: $ERROR"
                  exit 1
                fi
              fi
              
              POLL_COUNT=$((POLL_COUNT + 1))
              sleep 2
            done
            
            echo "✗ Deployment status polling timed out"
            exit 1
          elif [ "$HTTP_CODE" = "500" ]; then
            echo "Server error (HTTP $HTTP_CODE): $BODY"
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            fi
          else
            echo "Unexpected response (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
        done
        
        echo "✗ Failed to trigger redeploy after $MAX_RETRIES attempts"
        exit 1
      continue-on-error: false
