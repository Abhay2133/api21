# Config file for [Air](https://github.com/air-verse/air) in TOML format

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Just plain build command
  cmd = "go build -o ./tmp/main ./cmd/app/main.go"
  # Binary file yields from `cmd`
  bin = "./tmp/main"
  # Customize binary, can be used for running with extra args/envs
  full_bin = "APP_ENV=dev ./tmp/main"
  # Watch these filename extensions
  include_ext = ["go", "tpl", "html", "toml", "sql"]
  # Ignore these filename extensions or files
  exclude_ext = ["_test.go"]
  # Watch these directories
  include_dir = ["cmd", "internal", "config", "services"]
  # Exclude these directories
  exclude_dir = ["assets", "tmp", "vendor", "admin-ui", ".git", ".github", ".playwright-mcp"]
  # Watch these files
  include_file = []
  # Exclude these files
  exclude_file = []
  # Exclude unchanged files
  exclude_unchanged = true
  # Follow symlinks
  follow_symlink = true
  # Log file
  log = "air.log"
  # Delay before rebuild
  delay = 1000 # ms
  # Stop running old binary if build fails
  stop_on_error = true
  # Send Interrupt signal instead of SIGKILL
  send_interrupt = true
  # Kill process group
  kill_delay = 500 # ms

[log]
  # Show log time
  time = true
  # Clear console on rebuild
  clear_on_rebuild = true

[color]
  # Customize color for log categories
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[screen]
  clear_on_rebuild = true
  keep_scroll = true
