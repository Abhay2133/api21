<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0a;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      box-sizing: border-box;
      padding: 24px;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Gradient accent line on top */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
    }

    .icon-wrapper {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 50%;
      color: #6366f1;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 15px rgba(99, 102, 241, 0);
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px 0;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    p {
      color: #a3a3a3;
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 32px 0;
    }

    button {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      border: none;
      color: #ffffff;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #525252;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">
      <!-- Cloud Offline Premium SVG Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12H3a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2"/>
        <path d="M17.5 15h.01"/>
        <path d="M12 9v4"/>
        <path d="m9 12 3 3 3-3"/>
        <path d="M12 3v2"/>
        <path d="M20 18H4v-4c0-2.2 1.8-4 4-4h8c2.2 0 4 1.8 4 4v4Z"/>
        <line x1="1" y1="1" x2="23" y2="23" stroke="#ec4899" stroke-width="2"/>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>Please check your internet connection. We will automatically reconnect you once you are back online.</p>
    
    <button id="retry-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
      Try Again
    </button>
  </div>
  
  <div class="footer">
    Attempting to auto-reconnect...
  </div>

  <script>
    (function() {
      // Parse query string to extract original destination
      const urlParams = new URLSearchParams(window.location.search);
      const nextRoute = urlParams.get('_next') || '/';

      const retryBtn = document.getElementById('retry-btn');
      let redirected = false;
      let checkInProgress = false;

      function redirectToTarget() {
        if (redirected) return;
        redirected = true;
        clearInterval(pingInterval);
        console.log("[Offline Page] Network recovered! Redirecting to:", nextRoute);
        window.location.href = nextRoute;
      }

      // Periodically check actual connectivity by fetching our health endpoint.
      // We append a timestamp to ensure it bypasses any caches.
      async function checkConnectivity() {
        if (redirected || checkInProgress) return;
        checkInProgress = true;
        
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 4000); // 4-second timeout
          
          const response = await fetch('/api/v1/health?t=' + Date.now(), {
            method: 'GET',
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          
          if (response.ok) {
            redirectToTarget();
          } else {
            console.log("[Offline Page] Ping returned status " + response.status + ", still offline.");
          }
        } catch (error) {
          console.log("[Offline Page] Ping failed, still offline:", error.message || error);
        } finally {
          checkInProgress = false;
        }
      }

      // Retry Button click navigation: attempts immediate redirect
      retryBtn.addEventListener('click', function() {
        // Force navigate immediately to let browser try loading the page
        window.location.href = nextRoute;
      });

      // Check connectivity immediately on load
      checkConnectivity();

      // Set up a periodic check every 3 seconds for fast detection when returning online
      const pingInterval = setInterval(checkConnectivity, 3000);

      // Listen to the window 'online' event to trigger an instant check
      window.addEventListener('online', function() {
        console.log("[Offline Page] Window online event fired. Checking connectivity...");
        checkConnectivity();
      });
    })();
  </script>
</body>
</html>
